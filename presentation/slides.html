<h1 id="%E7%A0%94%E7%A9%B6%E8%83%8C%E6%99%AF">研究背景</h1>
<h2 id="%E3%81%AA%E3%81%9C%E7%95%B0%E5%88%86%E9%87%8E%E6%8A%80%E8%A1%93%E6%8E%A2%E7%B4%A2%E3%81%8C%E5%BF%85%E8%A6%81%E3%81%8B">なぜ異分野技術探索が必要か</h2>
<ul>
<li>企業・研究機関は <strong>自分たちの分野の外</strong> にある技術手法を参照することで，新しい問題解決の糸口を得る場合がある</li>
<li>例：画像解析，材料処理，洗浄，検査，制御……<strong>対象物が違っても課題が近い</strong>ことがある</li>
<li>特許文書は技術の名称・課題・解決手段・効果を含む <strong>豊富な知識源</strong></li>
</ul>
<h2 id="%E7%89%B9%E8%A8%B1%E6%96%87%E6%9B%B8%E3%82%92%E4%BD%BF%E3%81%86%E5%88%A9%E7%82%B9">特許文書を使う利点</h2>
<table>
<thead>
<tr>

<h2 id="%E5%85%A8%E6%96%87%E9%A1%9E%E4%BC%BC%E3%81%AE%E9%99%90%E7%95%8C">全文類似の限界</h2>
<div class="highlight">
全文をまとめてベクトル化すると，課題・対象物・解決手段・効果が<strong>同一の表現空間に混在</strong>し，候補が抽出された理由を説明しにくい
</div>
<h3 id="%E5%85%B7%E4%BD%93%E7%9A%84%E3%81%AA%E5%95%8F%E9%A1%8C">具体的な問題</h3>
<ol>
<li><strong>語彙の違い問題</strong>：「医療画像」「製造欠陥」「半導体基板」など分野固有語が類似度に強く影響</li>
<li><strong>理由の不明瞭さ</strong>：全文として似ていても，「課題が近いから？」「対象物の用語が似ているから？」かが不明</li>
<li><strong>有望候補の見落とし</strong>：対象物や分野名は違うが課題が近い候補が，全文類似だけでは上位に現れにくい</li>
</ol>
<div class="warn-box">
💡 専門家が候補を確認する際，「<strong>なぜこの候補を見るべきか</strong>」を理解できる形で提示することが重要
</div>

<h2 id="%E6%9C%AC%E7%A0%94%E7%A9%B6%E3%81%8C%E8%A7%A3%E3%81%8F%E5%95%8F%E3%81%84">本研究が解く問い</h2>

<h2 id="%E6%9C%AC%E7%A0%94%E7%A9%B6%E3%81%AE%E3%82%A2%E3%83%97%E3%83%AD%E3%83%BC%E3%83%81">本研究のアプローチ</h2>

<h1 id="%E6%96%87%E8%84%88%E6%8A%BD%E5%87%BA%E8%AA%B2%E9%A1%8C%E3%81%A8%E8%A7%A3%E6%B1%BA%E6%89%8B%E6%AE%B5%E3%81%AE%E5%88%86%E9%9B%A2">文脈抽出：課題と解決手段の分離</h1>
<h2 id="%E6%8A%BD%E5%87%BA%E9%A0%85%E7%9B%AE%E3%81%AE%E5%AE%9A%E7%BE%A9">抽出項目の定義</h2>
<table>
<thead>
<tr>
<th>フィールド</th>
<th>意味</th>
<th>例（医療画像解析）</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>problem_context</code></td>
<td>何の課題を解いているか</td>
<td>「腫瘍領域の精密な分割が困難」</td>
</tr>
<tr>
<td><code>solution_context</code></td>
<td>どのように解いているか</td>
<td>「U-Netによるエンコーダ-デコーダ構造を用いた」</td>
</tr>
<tr>
<td><code>technical_means</code></td>
<td>具体的な技術手段・手法名</td>
<td>U-Net, GAN, Transformer</td>
</tr>
<tr>
<td><code>target_object</code></td>
<td>技術が適用される対象物</td>
<td>CT画像，MRI，病変組織</td>
</tr>
<tr>
<td><code>application_field</code></td>
<td>応用分野</td>
<td>医療診断支援，放射線科</td>
</tr>
<tr>
<td><code>effect_context</code></td>
<td>得られる効果</td>
<td>セグメンテーション精度の向上</td>
</tr>
</tbody>
</table>
<h3 id="%E5%88%86%E9%9B%A2%E3%81%AE%E6%84%8F%E7%BE%A9">分離の意義</h3>
<div class="highlight">
全文類似では「医療画像 ↔ 欠陥画像」の<strong>対象物の違い</strong>が影響するが，<code>problem_context</code>に絞れば「<strong>画像中の異常領域を検出する</strong>」という課題の近さを捉えやすい
</div>
</section>

<h1 id="%E5%80%99%E8%A3%9C%E3%82%BF%E3%82%A4%E3%83%97%E3%81%AE%E5%AE%9A%E7%BE%A9">候補タイプの定義</h1>
<div class="two-col">
<div>
<h2 id="%E8%BF%91%E6%8E%A5%E8%A7%A3%E6%B1%BA%E7%AD%96%E5%9E%8B%E5%AE%9F%E9%A8%931%E3%83%BB%E4%B8%BB%E5%88%86%E6%9E%90">近接解決策型（実験1・主分析）</h2>
<ul>
<li>課題文脈・解決手段文脈の<strong>両方が比較的近い</strong>異分野間の候補</li>
<li>例：医療画像解析 → 製造欠陥検出
<ul>
<li>共通課題：「画像中の異常・欠陥領域を検出・分割する」</li>
<li>対象物は違うが手法が転用できる</li>
</ul>
</li>
</ul>
</div>
<div>
<h2 id="%E7%95%B0%E8%B3%AA%E8%A7%A3%E6%B1%BA%E7%AD%96%E5%9E%8B%E5%AE%9F%E9%A8%932%E3%83%BB%E8%A3%9C%E5%8A%A9%E5%88%86%E6%9E%90">異質解決策型（実験2・補助分析）</h2>
<ul>
<li>課題文脈に<strong>一定の関連</strong>はあるが，対象物・材料・工程・用途分野が<strong>大きく異なる</strong>候補</li>
<li>例：洗浄・除去系技術 → 半導体洗浄
<ul>
<li>「洗浄・残渣除去」という課題は関連</li>
<li>対象物や工程は大きく異なる</li>
</ul>
</li>
</ul>
</div>
</div>
<br />
<div class="highlight">
課題文脈類似度（Problem Similarity）が高く，解決手段文脈類似度（Solution Similarity）の差が大きい組み合わせが<strong>候補抽出の対象</strong>
</div>
</section>

<h1 id="%E6%9C%AC%E7%A0%94%E7%A9%B6%E3%81%AE%E8%B2%A2%E7%8C%AE">本研究の貢献</h1>
<h2 id="4%E3%81%A4%E3%81%AE%E8%B2%A2%E7%8C%AE">4つの貢献</h2>
<ol>
<li>
<p><strong>文脈分離フレームワーク</strong><br />
特許文書を <code>problem_context</code> と <code>solution_context</code> に分離するフレームワークを提示。候補抽出理由を「課題が近い」「解決手段として○○が提示されている」として説明しやすくした</p>
</li>
<li>
<p><strong>近接解決策型の主分析（実験1）</strong><br />
U-Netを対象として，医療画像解析→製造欠陥検出への後ろ向き評価を実施。過去期間でランク2位を達成</p>
</li>
<li>
<p><strong>異質解決策型の補助分析（実験2）</strong><br />
洗浄・除去系技術から半導体洗浄への候補抽出を探索的に確認。クラスタ設計の重要性を示した</p>
</li>
<li>
<p><strong>スクリーニング手法としての評価設計</strong><br />
LLM支援付き著者確認評価により，候補の解釈可能性を確認する評価体制を構築</p>
</li>
</ol>

<h1 id="%E3%81%BE%E3%81%A8%E3%82%81">まとめ</h1>
<h2 id="%E6%9C%AC%E7%A0%94%E7%A9%B6%E3%81%AE%E5%85%A8%E4%BD%93%E5%83%8F">本研究の全体像</h2>
<p>特許文書を <strong><code>problem_context</code>（課題文脈）</strong> と <strong><code>solution_context</code>（解決手段文脈）</strong> に分離し，課題が近い異分野間で対象分野では低出現な技術手法を専門家確認候補として抽出するスクリーニング手法を提案・検証した</p>
<h2 id="%E5%AE%9F%E9%A8%93%E7%B5%90%E6%9E%9C%E3%81%AE%E3%81%BE%E3%81%A8%E3%82%81">実験結果のまとめ</h2>
<div class="two-col">
<div>
<p><strong>実験1（主分析：近接解決策型）</strong></p>
<ul>
<li>A0（医療画像解析）→ B0（製造欠陥検出）</li>
<li>過去期間（2015-2018）のみで U-Net を<strong>ランク2位</strong>に抽出</li>
<li>将来期間（2019-2024）で B0 に314件出現を確認</li>
<li>全文類似ベースラインより候補の<strong>説明可能性が高い</strong></li>
</ul>
</div>
<div>
<p><strong>実験2（補助分析：異質解決策型）</strong></p>
<ul>
<li>洗浄・除去系技術 → 半導体洗浄</li>
<li>46件中 ◎+○ = <strong>16件（35%）</strong> が有効</li>
<li>半導体基板洗浄クラスタ：6件全て有効</li>
<li><strong>クラスタ設計</strong>が候補品質に大きく影響</li>
</ul>
</div>
</div>
<div class="result-box">
✅ 課題文脈と解決手段文脈を分離することで，「何の課題が近いのか」「どの解決手段が候補なのか」を説明しやすい専門家確認候補を抽出できることを確認した
</div>
</section>
